<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- เงาใต้เหรียญ (ตกกระทบพื้น) -->
  <ellipse cx="50" cy="85" rx="25" ry="8" fill="rgba(0,0,0,0.15)" />

  <!-- ขอบนอกเหรียญ (Outer Rim - สีทองเข้ม) -->
  <circle cx="50" cy="45" r="30" fill="#D97706" /> 
  <!-- ด้านในเหรียญ (Inner Face - สีทองสว่าง) -->
  <circle cx="50" cy="45" r="24" fill="#F59E0B" /> 

  <!-- สัญลักษณ์ตรงกลางเหรียญ (ลายดาว 4 แฉก แบบ Minimal) -->
  <path d="M 50 28 L 56 40 L 68 45 L 56 50 L 50 62 L 44 50 L 32 45 L 44 40 Z" fill="#FEF3C7" />
</svg>
