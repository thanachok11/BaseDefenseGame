<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- เงาใต้เท้า (Flat Shadow สีเทาอ่อน) -->
  <ellipse cx="50" cy="85" rx="20" ry="8" fill="rgba(0,0,0,0.15)" />
  
  <!-- ลำตัวชุดเกราะ (สีแดงอมส้มให้ดูอันตรายแต่ไม่ทึบเกินไป #EF4444) -->
  <rect x="30" y="45" width="40" height="35" rx="10" fill="#EF4444" />
  
  <!-- แขนชุดเกราะ (สีแดงเข้ม #DC2626) -->
  <rect x="22" y="50" width="14" height="20" rx="7" fill="#DC2626" />
  <rect x="64" y="50" width="14" height="20" rx="7" fill="#DC2626" />
  
  <!-- หมวกเกราะ (Helmet) -->
  <circle cx="50" cy="38" r="18" fill="#EF4444" />
  <path d="M 32 45 Q 50 15 68 45 Z" fill="#EF4444" />
  
  <!-- ช่องมองของหมวกเกราะ (Visor - สีเทาเข้มตัดกับสีแดง #1F2937) -->
  <rect x="38" y="34" width="24" height="8" rx="3" fill="#1F2937" />
  
  <!-- ขนนกบนหมวก (Plume) -->
  <path d="M 50 20 Q 65 5 75 15 Q 60 22 50 20 Z" fill="#FCA5A5" />
  
  <!-- หอก/อาวุธเล็กๆ ในมือ -->
  <rect x="70" y="40" width="4" height="45" rx="2" fill="#9CA3AF" />
  <path d="M 67 40 L 72 25 L 77 40 Z" fill="#D1D5DB" />
</svg>
