<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- เงาใต้ฐาน -->
  <ellipse cx="50" cy="85" rx="35" ry="10" fill="rgba(0,0,0,0.15)" />
  
  <!-- โครงสร้างปากทางเข้าเหมือง (ไม้สีเข้ม) -->
  <path d="M 25 75 L 25 35 Q 50 20 75 35 L 75 75 Z" fill="#78350F" />
  <path d="M 35 75 L 35 45 Q 50 35 65 45 L 65 75 Z" fill="#1F2937" /> <!-- ถ้ำมืด -->
  
  <!-- รางรถแร่ -->
  <path d="M 42 75 L 32 95 M 58 75 L 68 95" stroke="#9CA3AF" stroke-width="2" />
  <path d="M 37 82 L 63 82 M 35 88 L 65 88 M 33 94 L 67 94" stroke="#92400E" stroke-width="2" />
  
  <!-- ตะกร้าแร่/รถเข็น -->
  <rect x="58" y="65" width="26" height="15" rx="2" fill="#D97706" />
  
  <!-- ก้อนทองคำ/เหรียญทองล้นตะกร้า (#FBBF24) -->
  <circle cx="63" cy="62" r="4.5" fill="#FBBF24" />
  <circle cx="71" cy="60" r="5" fill="#FBBF24" />
  <circle cx="78" cy="63" r="4.5" fill="#FBBF24" />
  <circle cx="67" cy="65" r="3" fill="#FEF3C7" />
</svg>
