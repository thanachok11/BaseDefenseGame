<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- เงาใต้ฐาน -->
  <ellipse cx="50" cy="85" rx="35" ry="10" fill="rgba(0,0,0,0.15)" />
  
  <!-- โครงสร้างเหมืองหิน/ผาหิน -->
  <path d="M 20 75 L 30 35 L 65 30 L 80 50 L 85 75 Z" fill="#94A3B8" />
  <path d="M 30 35 L 65 30 L 60 75 L 20 75 Z" fill="#64748B" /> <!-- หน้าตัดหิน -->
  
  <!-- ก้อนหินสกัดเรียบร้อยกองอยู่ -->
  <rect x="62" y="60" width="20" height="15" rx="2" fill="#CBD5E1" />
  <rect x="68" y="48" width="16" height="14" rx="2" fill="#E2E8F0" />
  <rect x="52" y="68" width="12" height="10" rx="1" fill="#94A3B8" />
  
  <!-- ค้อนตอกหิน (Sledgehammer) พาดอยู่ -->
  <line x1="30" y1="80" x2="48" y2="50" stroke="#78350F" stroke-width="3" stroke-linecap="round" />
  <path d="M 40 46 L 56 55 L 50 62 L 34 53 Z" fill="#334155" /> <!-- หัวค้อนเหล็ก -->
</svg>
