<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- เงาใต้ฐาน -->
  <ellipse cx="50" cy="85" rx="35" ry="10" fill="rgba(0,0,0,0.15)" />
  
  <!-- โครงสร้างเต็นท์ (สีส้ม) -->
  <path d="M 20 75 L 50 20 L 80 75 Z" fill="#F97316" />
  <path d="M 50 20 L 80 75 L 65 75 L 50 40 Z" fill="#EA580C" /> <!-- เงาพับเต็นท์ -->
  
  <!-- ทางเข้าเต็นท์ -->
  <path d="M 40 75 L 50 55 L 60 75 Z" fill="#431407" />
  
  <!-- โล่วางพิงเต็นท์ -->
  <circle cx="35" cy="65" r="11" fill="#9CA3AF" />
  <circle cx="35" cy="65" r="7" fill="#F97316" />
  <circle cx="35" cy="65" r="2" fill="#E2E8F0" />
  
  <!-- ดาบปักพื้น/วางพิง -->
  <line x1="75" y1="45" x2="65" y2="75" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" />
  <line x1="68" y1="62" x2="74" y2="65" stroke="#F59E0B" stroke-width="3" /> <!-- กระบังดาบ -->
  <line x1="66" y1="72" x2="65" y2="75" stroke="#4B5563" stroke-width="4" stroke-linecap="round" />
</svg>
