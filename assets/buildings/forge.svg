<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- เงาใต้ฐาน -->
  <ellipse cx="50" cy="85" rx="35" ry="10" fill="rgba(0,0,0,0.15)" />
  
  <!-- หลังคา/ผ้าใบ (สีม่วง) -->
  <path d="M 15 45 L 35 15 L 85 15 L 95 45 Z" fill="#A78BFA" />
  <path d="M 35 15 L 85 15 L 75 25 L 25 25 Z" fill="#8B5CF6" /> <!-- แสงเงาบนหลังคา -->
  
  <!-- เสาไม้ค้ำยัน -->
  <rect x="25" y="45" width="4" height="30" fill="#78350F" />
  <rect x="71" y="45" width="4" height="30" fill="#78350F" />
  
  <!-- โครงสร้างเตาหลอม (หิน) -->
  <path d="M 35 75 L 35 45 L 60 45 L 60 75 Z" fill="#64748B" />
  <path d="M 40 75 L 40 55 Q 47.5 50 55 55 L 55 75 Z" fill="#1F2937" /> <!-- ปากเตา -->
  
  <!-- เปลวไฟในเตาหลอม -->
  <path d="M 44 75 Q 40 60 47 55 Q 52 65 51 75 Z" fill="#EF4444" />
  <path d="M 46 75 Q 45 65 48 60 Q 51 68 50 75 Z" fill="#FBBF24" />
  
  <!-- ทั่งตีเหล็ก (Anvil) -->
  <path d="M 68 65 L 88 65 L 86 70 L 70 70 Z" fill="#4B5563" /> <!-- ส่วนบน -->
  <path d="M 73 70 L 83 70 L 85 85 L 71 85 Z" fill="#334155" /> <!-- ฐานทั่ง -->
  
  <!-- ค้อนตีเหล็กอันเล็กวางบนทั่ง -->
  <rect x="75" y="60" width="8" height="4" rx="1" fill="#1F2937" />
  <line x1="79" y1="60" x2="79" y2="52" stroke="#78350F" stroke-width="2" stroke-linecap="round" />
</svg>
