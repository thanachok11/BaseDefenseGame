<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- เงาใต้เท้า (Flat Shadow สีเทาอ่อน) -->
  <ellipse cx="50" cy="85" rx="18" ry="7" fill="rgba(0,0,0,0.15)" />

  <!-- คทาเวทมนตร์ (Magic Staff) ถือที่มือขวา -->
  <rect x="68" y="25" width="4" height="45" rx="2" fill="#78350F" />
  <!-- คริสตัลบนยอดคทา (Gold/Amber Glowing Gem) -->
  <circle cx="70" cy="25" r="8" fill="#F59E0B" /> 
  <circle cx="70" cy="25" r="4" fill="#FEF3C7" /> 

  <!-- ชุดคลุมนักเวท (Mage Robe) -->
  <path d="M 30 75 L 40 40 L 60 40 L 70 75 Z" fill="#059669" /> <!-- สีเขียวเข้มตัดกับ #10B981 -->
  <!-- เข็มขัดสีทอง -->
  <rect x="35" y="65" width="30" height="4" fill="#F59E0B" /> 

  <!-- แขนซ้าย (กำลังร่ายเวท) -->
  <circle cx="25" cy="55" r="4.5" fill="#fcdbb6" />
  <!-- เอฟเฟกต์พลังเวทเล็กๆ ลอยอยู่ -->
  <circle cx="20" cy="45" r="3" fill="#10B981" />
  <circle cx="28" cy="42" r="2" fill="#10B981" />

  <!-- แขนขวาถือคทา -->
  <circle cx="70" cy="50" r="4.5" fill="#fcdbb6" />

  <!-- หัว / ใบหน้า -->
  <circle cx="50" cy="38" r="15" fill="#fcdbb6" />
  
  <!-- ตา -->
  <circle cx="45" cy="36" r="2.5" fill="#333333" />
  <circle cx="55" cy="36" r="2.5" fill="#333333" />

  <!-- หมวกพ่อมด (Wizard Hat) -->
  <path d="M 25 35 L 75 35 L 50 5 Z" fill="#10B981" />
  <!-- แถบคาดหมวกสีทอง -->
  <rect x="32" y="30" width="36" height="5" rx="2" fill="#F59E0B" /> 
</svg>
