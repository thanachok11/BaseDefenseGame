<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- วงเวทใต้ฐานเรืองแสง (แทนเงา) -->
  <ellipse cx="50" cy="90" rx="30" ry="10" fill="none" stroke="#10B981" stroke-width="3" />
  <ellipse cx="50" cy="90" rx="20" ry="5" fill="none" stroke="#F59E0B" stroke-width="2" />
  <!-- ตัวลอยขึ้นมา -->
  <!-- คทาทองคำยักษ์ -->
  <rect x="72" y="10" width="6" height="70" rx="3" fill="#F59E0B" />
  <circle cx="75" cy="15" r="15" fill="#10B981" /> <!-- คริสตัลยักษ์ -->
  <circle cx="70" cy="10" r="5" fill="#FFFFFF" />
  <!-- ชุด Archmage ลอยตัว -->
  <path d="M 30 70 L 40 30 L 60 30 L 70 70 Q 50 85 30 70 Z" fill="#F8FAFC" />
  <path d="M 40 30 L 60 30 L 50 75 Z" fill="#10B981" />
  <circle cx="50" cy="28" r="15" fill="#fcdbb6" />
  <circle cx="45" cy="26" r="2.5" fill="#333333" /><circle cx="55" cy="26" r="2.5" fill="#333333" />
  <!-- หมวก Archmage สุดอลังการ -->
  <path d="M 10 25 L 90 25 L 50 -15 Z" fill="#F8FAFC" stroke="#F59E0B" stroke-width="3" />
</svg>
