<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- พื้นหลังโปร่งใส ไม่มีเส้นทแยงมุมสีดำ -->
  
  <!-- เงาใต้เท้า (Flat Shadow สีเทาอ่อน ไม่ใช้สีฟ้า) -->
  <ellipse cx="50" cy="85" rx="20" ry="8" fill="rgba(0,0,0,0.15)" />
  
  <!-- ลำตัว / ผ้าคลุม (สี Modern Green #10B981) -->
  <rect x="30" y="45" width="40" height="35" rx="12" fill="#10B981" />
  
  <!-- แขนและมือ -->
  <circle cx="28" cy="65" r="6" fill="#fcdbb6" />
  <circle cx="72" cy="65" r="6" fill="#fcdbb6" />
  
  <!-- หัว / ใบหน้า -->
  <circle cx="50" cy="40" r="18" fill="#fcdbb6" />
  
  <!-- ตา -->
  <circle cx="43" cy="38" r="3" fill="#333333" />
  <circle cx="57" cy="38" r="3" fill="#333333" />
  
  <!-- มงกุฎสีทอง -->
  <path d="M 34 22 L 40 30 L 50 15 L 60 30 L 66 22 L 64 33 L 36 33 Z" fill="#F59E0B" />
</svg>
